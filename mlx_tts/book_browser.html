<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Book Browser — MLX TTS</title>
<style>
:root {
  --bg: #0c0e18; --surface: #161927; --surface2: #1e2236; --surface3: #252944;
  --border: #2a2f4a; --accent: #7c6af7; --accent2: #a78bfa; --accent3: #c4b5fd;
  --text: #e2e4f0; --muted: #6b7094; --success: #4ade80; --warn: #fbbf24; --error: #f87171;
}
* { box-sizing: border-box; margin: 0; padding: 0; }
body { background: var(--bg); color: var(--text); font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; display: flex; flex-direction: column; height: 100vh; overflow: hidden; }

header {
  background: var(--surface); border-bottom: 1px solid var(--border);
  padding: 12px 20px; display: flex; align-items: center; gap: 14px; flex-shrink: 0;
}
header a { color: var(--accent2); text-decoration: none; font-size: 0.85rem; }
header a:hover { color: var(--accent3); }
.header-title { font-size: 1.1rem; font-weight: 700; flex: 1; }
.btn {
  background: var(--accent); color: #fff; border: none; border-radius: 9px;
  padding: 8px 16px; font-size: 0.85rem; font-weight: 600; cursor: pointer;
  display: inline-flex; align-items: center; gap: 6px; transition: all .15s;
}
.btn:hover { background: var(--accent2); }
.btn:disabled { opacity: .45; cursor: not-allowed; }
.btn-sm { padding: 6px 12px; font-size: 0.8rem; }
.btn-ghost { background: transparent; border: 1px solid var(--border); color: var(--muted); }
.btn-ghost:hover { border-color: var(--accent); color: var(--text); background: transparent; }

/* Layout: sidebar + main */
.workspace { display: grid; grid-template-columns: 280px 1fr; flex: 1; overflow: hidden; }
.sidebar {
  background: var(--surface); border-right: 1px solid var(--border);
  overflow-y: auto; display: flex; flex-direction: column;
}
.sidebar-header {
  padding: 16px; font-size: 0.72rem; font-weight: 700; text-transform: uppercase;
  letter-spacing: .08em; color: var(--muted); border-bottom: 1px solid var(--border);
}
.book-item {
  padding: 12px 16px; cursor: pointer; border-bottom: 1px solid var(--border);
  transition: background .12s;
}
.book-item:hover { background: var(--surface2); }
.book-item.active { background: var(--surface2); border-left: 3px solid var(--accent); }
.book-title { font-size: 0.9rem; font-weight: 600; }
.book-meta { font-size: 0.72rem; color: var(--muted); margin-top: 3px; }

.main { overflow-y: auto; padding: 24px; display: flex; flex-direction: column; gap: 20px; }
.empty-state { text-align: center; color: var(--muted); padding: 60px 20px; font-size: 0.9rem; }

/* Chapter cards */
.chapter-grid { display: flex; flex-direction: column; gap: 10px; }
.chapter-card {
  background: var(--surface); border: 1px solid var(--border); border-radius: 10px;
  padding: 14px 18px; display: flex; align-items: center; gap: 14px;
  cursor: pointer; transition: all .15s;
}
.chapter-card:hover { border-color: var(--accent); }
.chapter-num {
  background: var(--surface3); border-radius: 6px; padding: 4px 10px;
  font-size: 0.8rem; font-weight: 700; color: var(--accent2); min-width: 36px; text-align: center;
}
.chapter-info { flex: 1; min-width: 0; }
.chapter-title-text { font-size: 0.88rem; font-weight: 600; }
.chapter-stats { font-size: 0.72rem; color: var(--muted); margin-top: 3px; }
.chapter-actions { display: flex; gap: 6px; }
.status-badge {
  font-size: 0.7rem; padding: 2px 8px; border-radius: 4px; font-weight: 600;
}
.status-pending { color: var(--muted); background: var(--surface2); }
.status-parsed { color: var(--warn); background: rgba(251,191,36,.1); }
.status-produced { color: var(--success); background: rgba(74,222,128,.1); }

/* Character registry */
.char-table { width: 100%; border-collapse: collapse; }
.char-table th { text-align: left; padding: 8px 12px; font-size: 0.72rem; font-weight: 700; text-transform: uppercase; letter-spacing: .05em; color: var(--muted); border-bottom: 1px solid var(--border); }
.char-table td { padding: 8px 12px; border-bottom: 1px solid var(--border); font-size: 0.85rem; }
.char-table select {
  background: var(--bg); border: 1px solid var(--border); border-radius: 6px;
  color: var(--text); padding: 4px 8px; font-size: 0.8rem;
}

/* Segment editor (reuse from story studio) */
.seg-card {
  background: var(--surface); border: 1px solid var(--border);
  border-radius: 14px; overflow: hidden; transition: border-color .15s;
}
.seg-header {
  display: flex; align-items: center; gap: 10px; padding: 10px 14px;
  border-bottom: 1px solid var(--border); background: var(--surface2);
}
.seg-color { width: 10px; height: 10px; border-radius: 50%; flex-shrink: 0; }
.char-name { font-weight: 600; font-size: 0.85rem; flex: 1; }
.seg-idx { font-size: 0.72rem; color: var(--muted); }
.seg-settings { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 8px; padding: 10px 14px; }
.field-label { font-size: 0.68rem; color: var(--muted); font-weight: 600; text-transform: uppercase; letter-spacing: .04em; margin-bottom: 3px; }
select {
  background: var(--bg); border: 1px solid var(--border); border-radius: 7px;
  color: var(--text); padding: 6px 8px; font-size: 0.8rem; width: 100%; cursor: pointer;
}
.seg-text textarea {
  background: var(--bg); border: 1px solid var(--border); border-radius: 9px;
  color: var(--text); font-size: 0.88rem; line-height: 1.6; padding: 8px 10px;
  resize: vertical; min-height: 70px; width: 100%; font-family: inherit;
}
.seg-text { padding: 0 14px 12px; }
.seg-text textarea:focus { outline: none; border-color: var(--accent); }

.emotion-row { grid-column: 1 / -1; display: flex; flex-wrap: wrap; gap: 5px; }
.em-pill {
  background: var(--bg); border: 1px solid var(--border); border-radius: 20px;
  padding: 3px 8px; font-size: 0.72rem; cursor: pointer; display: flex;
  align-items: center; gap: 3px; transition: all .12s; user-select: none;
}
.em-pill:hover { border-color: var(--accent); }
.em-pill.active { border-color: var(--accent); background: rgba(124,106,247,.18); color: var(--accent3); }

/* Progress */
.progress-wrap { padding: 0 0 12px; }
.progress-bar-bg { background: var(--surface2); border-radius: 4px; height: 6px; overflow: hidden; }
.progress-bar-fill { height: 100%; background: linear-gradient(90deg, var(--accent), var(--accent2)); border-radius: 4px; transition: width .3s; }

/* Audio player */
.player-area {
  padding: 14px; background: var(--surface2); border-radius: 10px;
  border: 1px solid var(--border);
}
.player-area audio { width: 100%; border-radius: 8px; margin-top: 8px; }

.section-title {
  font-size: 0.72rem; font-weight: 700; text-transform: uppercase;
  letter-spacing: .08em; color: var(--muted); margin-bottom: 8px;
}

@media (max-width: 860px) {
  .workspace { grid-template-columns: 1fr; }
  .sidebar { max-height: 200px; border-right: none; border-bottom: 1px solid var(--border); }
}
</style>
</head>
<body>

<header>
  <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="#a78bfa" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
    <path d="M4 19.5A2.5 2.5 0 0 1 6.5 17H4"/><path d="M2 12s1.5-2 5-2 8 4 8 4-1.5 2-5 2-8-4-8-4z"/><path d="M10 6s1.5-2 5-2 8 4 8 4-1.5 2-5 2-8-4-8-4z"/>
  </svg>
  <span class="header-title">Book Browser</span>
  <a href="/">Story Studio</a>
  <button class="btn btn-sm btn-ghost" onclick="showNewBookDialog()">+ New Book</button>
</header>

<div class="workspace">
  <div class="sidebar" id="sidebar">
    <div class="sidebar-header">Books</div>
    <div id="bookList"></div>
  </div>
  <div class="main" id="mainPanel">
    <div class="empty-state" id="emptyState">
      <p>Select a book from the sidebar,</p>
      <p>or create a new book project.</p>
    </div>
  </div>
</div>

<!-- New Book Dialog -->
<div id="newBookDialog" style="display:none;position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:100;display:none;align-items:center;justify-content:center;">
  <div style="background:var(--surface);border:1px solid var(--border);border-radius:14px;padding:24px;width:400px;max-width:90%;">
    <h3 style="margin-bottom:16px;font-size:1rem;">Create New Book</h3>
    <div style="display:flex;flex-direction:column;gap:12px;">
      <div><div class="field-label">Name (directory)</div><input id="nbName" style="width:100%;padding:8px;background:var(--bg);border:1px solid var(--border);border-radius:7px;color:var(--text);font-size:.9rem" placeholder="my_novel"></div>
      <div><div class="field-label">Title</div><input id="nbTitle" style="width:100%;padding:8px;background:var(--bg);border:1px solid var(--border);border-radius:7px;color:var(--text);font-size:.9rem" placeholder="我的小說"></div>
      <div><div class="field-label">Language</div>
        <select id="nbLang">
          <option value="zh">Mandarin Chinese</option>
          <option value="en-us">English (US)</option>
          <option value="en-gb">English (UK)</option>
          <option value="ja">Japanese</option>
        </select>
      </div>
      <div><div class="field-label">Author</div><input id="nbAuthor" style="width:100%;padding:8px;background:var(--bg);border:1px solid var(--border);border-radius:7px;color:var(--text);font-size:.9rem"></div>
      <div style="display:flex;gap:10px;justify-content:flex-end;margin-top:8px;">
        <button class="btn btn-sm btn-ghost" onclick="hideNewBookDialog()">Cancel</button>
        <button class="btn btn-sm" onclick="createBook()">Create</button>
      </div>
    </div>
  </div>
</div>

<script>
const API = '';
let currentBook = null;
let currentChapter = null;
let voices = [], languages = {}, emotions = {};

// ── Boot ─────────────────────────────────────────────────────────────────────
async function boot() {
  [voices, languages, emotions] = await Promise.all([
    fetch(`${API}/api/voices`).then(r => r.json()),
    fetch(`${API}/api/languages`).then(r => r.json()),
    fetch(`${API}/api/emotions`).then(r => r.json()),
  ]);
  loadBooks();
}

// ── Books ─────────────────────────────────────────────────────────────────────
async function loadBooks() {
  const books = await fetch(`${API}/api/books`).then(r => r.json());
  const list = document.getElementById('bookList');
  list.innerHTML = '';
  if (!books.length) {
    list.innerHTML = '<div style="padding:16px;color:var(--muted);font-size:.8rem;text-align:center">No books yet</div>';
    return;
  }
  books.forEach(b => {
    const div = document.createElement('div');
    div.className = 'book-item' + (currentBook === b.name ? ' active' : '');
    div.innerHTML = `<div class="book-title">${esc(b.title)}</div>
      <div class="book-meta">${b.chapters} ch · ${b.produced} produced · ${b.language}</div>`;
    div.onclick = () => selectBook(b.name);
    list.appendChild(div);
  });
}

async function selectBook(name) {
  currentBook = name;
  currentChapter = null;
  document.querySelectorAll('.book-item').forEach(el => el.classList.remove('active'));
  event?.target?.closest('.book-item')?.classList.add('active');
  const book = await fetch(`${API}/api/books/${name}`).then(r => r.json());
  renderBook(book);
}

function renderBook(book) {
  const main = document.getElementById('mainPanel');
  const produced = book.chapters?.filter(c => c.status === 'produced').length || 0;
  const totalDur = book.chapters?.reduce((s, c) => s + (c.duration_s || 0), 0) || 0;

  let html = `
    <h2 style="font-size:1.3rem;margin-bottom:4px">${esc(book.title)}</h2>
    <div style="font-size:.8rem;color:var(--muted);margin-bottom:20px">
      ${book.author ? esc(book.author) + ' · ' : ''}${book.language} · ${book.genre || 'fiction'}
      &nbsp;·&nbsp; ${produced}/${book.chapters?.length || 0} chapters produced
      ${totalDur > 0 ? '&nbsp;·&nbsp; ' + Math.round(totalDur/60) + ' min total' : ''}
    </div>

    <div style="display:flex;gap:8px;margin-bottom:20px;">
      <button class="btn btn-sm" onclick="scanChapters()">Scan Chapters</button>
      <button class="btn btn-sm btn-ghost" onclick="produceAll()">Produce All Pending</button>
    </div>

    <div class="section-title">Characters</div>
    <table class="char-table" id="charTable">
      <tr><th>Character</th><th>Gender</th><th>Voice</th><th>Role</th></tr>
      ${Object.entries(book.characters || {}).map(([name, c]) => `
        <tr>
          <td><strong>${esc(name)}</strong></td>
          <td>${c.gender}</td>
          <td><select onchange="updateCharVoice('${esc(name)}', this.value)">${buildVoiceOpts(c.lang || book.language, c.voice)}</select></td>
          <td>${c.role}</td>
        </tr>
      `).join('')}
    </table>

    <div class="section-title" style="margin-top:24px">Chapters</div>
    <div class="chapter-grid" id="chapterGrid">
      ${(book.chapters || []).map(ch => `
        <div class="chapter-card" onclick="selectChapter(${ch.number})">
          <div class="chapter-num">${String(ch.number).padStart(3, '0')}</div>
          <div class="chapter-info">
            <div class="chapter-title-text">${esc(ch.title || 'Chapter ' + ch.number)}</div>
            <div class="chapter-stats">
              ${ch.segments ? ch.segments + ' segments' : '—'}
              ${ch.duration_s ? ' · ' + ch.duration_s.toFixed(1) + 's' : ''}
            </div>
          </div>
          <div class="chapter-actions">
            <span class="status-badge status-${ch.status}">${ch.status}</span>
            ${ch.status === 'produced' ? '<button class="btn btn-sm btn-ghost" onclick="event.stopPropagation();playChapter(' + ch.number + ')">▶</button>' : ''}
            ${ch.status === 'parsed' ? '<button class="btn btn-sm" onclick="event.stopPropagation();produceChapter(' + ch.number + ')">Produce</button>' : ''}
          </div>
        </div>
      `).join('')}
    </div>

    <div id="chapterDetail"></div>
  `;
  main.innerHTML = html;
}

// ── Chapter detail ────────────────────────────────────────────────────────────
async function selectChapter(num) {
  currentChapter = num;
  const detail = document.getElementById('chapterDetail');
  detail.innerHTML = '<div style="padding:20px;color:var(--muted)">Loading...</div>';

  try {
    const story = await fetch(`${API}/api/books/${currentBook}/chapters/${num}`).then(r => r.json());
    if (story.error) { detail.innerHTML = `<div style="color:var(--error)">${story.error}</div>`; return; }
    renderChapterDetail(story, num);
  } catch(e) {
    detail.innerHTML = `<div style="color:var(--error)">Failed to load chapter: ${e.message}</div>`;
  }
}

function renderChapterDetail(story, num) {
  const detail = document.getElementById('chapterDetail');
  const segs = story.segments || [];

  let html = `
    <div style="margin-top:20px;display:flex;align-items:center;gap:12px;">
      <h3 style="font-size:1rem;flex:1">Chapter ${String(num).padStart(3, '0')} — ${esc(story.title || '')}</h3>
      <span style="font-size:.78rem;color:var(--muted)">${segs.length} segments</span>
      <button class="btn btn-sm btn-ghost" onclick="saveChapter(${num})">Save Changes</button>
      <button class="btn btn-sm" onclick="produceChapter(${num})">Produce</button>
    </div>
  `;

  if (story.audio_url) {
    html += `
      <div class="player-area">
        <audio controls src="${story.audio_url}" style="width:100%"></audio>
      </div>
    `;
  }

  html += '<div style="display:flex;flex-direction:column;gap:10px;margin-top:12px;">';
  segs.forEach((seg, i) => {
    html += buildSegmentCard(seg, i, num);
  });
  html += '</div>';

  detail.innerHTML = html;
}

function buildSegmentCard(seg, idx, chapterNum) {
  const color = charColor(seg.character);
  return `
    <div class="seg-card">
      <div class="seg-header">
        <div class="seg-color" style="background:${color}"></div>
        <span class="char-name">${esc(seg.character)}</span>
        <span class="seg-idx">#${idx+1}</span>
      </div>
      <div class="seg-settings">
        <div>
          <div class="field-label">Voice</div>
          <select id="sv_${chapterNum}_${idx}" onchange="segData[${idx}].voice=this.value">${buildVoiceOpts(seg.lang, seg.voice)}</select>
        </div>
        <div>
          <div class="field-label">Emotion</div>
          <select id="se_${chapterNum}_${idx}" onchange="segData[${idx}].emotion=this.value">
            ${Object.entries(emotions).map(([k,v]) => `<option value="${k}" ${k===seg.emotion?'selected':''}>${v.icon} ${v.label}</option>`).join('')}
          </select>
        </div>
        <div>
          <div class="field-label">Speed: ${seg.speed}x</div>
          <input type="range" min="0.5" max="2.0" step="0.05" value="${seg.speed}"
            onchange="segData[${idx}].speed=parseFloat(this.value);this.previousElementSibling||this.parentElement.querySelector('.field-label').textContent='Speed: '+this.value+'x'"
            style="width:100%;margin-top:4px;">
        </div>
      </div>
      <div class="seg-text">
        <textarea id="st_${chapterNum}_${idx}" onchange="segData[${idx}].text=this.value">${esc(seg.text)}</textarea>
      </div>
    </div>`;
}

// ── Data for editing ──────────────────────────────────────────────────────────
let segData = [];

const _origSelectChapter = selectChapter;
selectChapter = async function(num) {
  await _origSelectChapter(num);
  // Populate segData after loading
  try {
    const story = await fetch(`${API}/api/books/${currentBook}/chapters/${num}`).then(r => r.json());
    segData = (story.segments || []).map(s => ({...s}));
  } catch {}
};

// ── Actions ────────────────────────────────────────────────────────────────────
async function scanChapters() {
  await fetch(`${API}/api/books/${currentBook}/scan`, {method: 'POST'});
  selectBook(currentBook);
}

async function produceAll() {
  const r = await fetch(`${API}/api/books/${currentBook}/produce-all`, {method: 'POST'}).then(r => r.json());
  if (r.job_id) {
    alert('Production started. Job: ' + r.job_id + ' (' + r.chapters + ' chapters)');
  }
}

async function produceChapter(num) {
  const r = await fetch(`${API}/api/books/${currentBook}/chapters/${num}/produce`, {method: 'POST'}).then(r => r.json());
  if (r.job_id) {
    alert('Production started. Job: ' + r.job_id);
  }
}

function playChapter(num) {
  const url = `${API}/api/books/${currentBook}/chapters/${num}/audio`;
  window.open(url, '_blank');
}

async function saveChapter(num) {
  if (!segData.length) return;
  const body = {
    title: 'Chapter ' + String(num).padStart(3, '0'),
    segments: segData.map((s, i) => ({
      id: s.id || `seg_${i+1}`,
      character: s.character,
      text: s.text,
      voice: s.voice,
      lang: s.lang,
      emotion: s.emotion,
      speed: s.speed,
    })),
  };
  await fetch(`${API}/api/books/${currentBook}/chapters/${num}`, {
    method: 'PUT',
    headers: {'Content-Type': 'application/json'},
    body: JSON.stringify(body),
  });
  alert('Chapter saved!');
}

async function updateCharVoice(charName, voice) {
  const book = await fetch(`${API}/api/books/${currentBook}`).then(r => r.json());
  const chars = book.characters || {};
  if (chars[charName]) chars[charName].voice = voice;
  await fetch(`${API}/api/books/${currentBook}/characters`, {
    method: 'PUT',
    headers: {'Content-Type': 'application/json'},
    body: JSON.stringify({characters: chars}),
  });
}

// ── New Book Dialog ───────────────────────────────────────────────────────────
function showNewBookDialog() { document.getElementById('newBookDialog').style.display = 'flex'; }
function hideNewBookDialog() { document.getElementById('newBookDialog').style.display = 'none'; }

async function createBook() {
  const body = {
    name: document.getElementById('nbName').value,
    title: document.getElementById('nbTitle').value,
    language: document.getElementById('nbLang').value,
    author: document.getElementById('nbAuthor').value,
  };
  if (!body.name) { alert('Name is required'); return; }
  await fetch(`${API}/api/books/init`, {
    method: 'POST',
    headers: {'Content-Type': 'application/json'},
    body: JSON.stringify(body),
  });
  hideNewBookDialog();
  loadBooks();
}

// ── Helpers ────────────────────────────────────────────────────────────────────
const CHAR_COLORS = ['#7c6af7','#ec4899','#f59e0b','#10b981','#3b82f6','#ef4444','#8b5cf6','#06b6d4'];
const charColorMap = {};
function charColor(name) {
  if (!charColorMap[name]) {
    const idx = Object.keys(charColorMap).length % CHAR_COLORS.length;
    charColorMap[name] = CHAR_COLORS[idx];
  }
  return charColorMap[name];
}

function buildVoiceOpts(lang, selectedVoice) {
  const filtered = voices.filter(v => v.lang === lang);
  const list = filtered.length ? filtered : voices.filter(v => v.lang_code === 'a');
  return list.map(v =>
    `<option value="${v.id}" ${v.id === selectedVoice ? 'selected' : ''}>${v.id} — ${v.gender}, ${v.note}</option>`
  ).join('');
}

function esc(s) {
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/\n/g,' ');
}

boot();
</script>
</body>
</html>
